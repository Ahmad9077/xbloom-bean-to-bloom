name = "xbloom-recipe-worker"
account_id = "cb8327c64dd8aba791c042b403b7e766"
main = "index.js"
compatibility_date = "2024-09-23"
compatibility_flags = []

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "xbloom-db"
database_id = "9ba67ed8-f4fe-4960-94e4-d4a9584ddd1f"

[assets]
directory = "./assets-dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:8787"
CANONICAL_ORIGIN = "https://beantobloom.pages.dev"
RECIPE_ENGINE = "table"

[triggers]
crons = ["0 * * * *"]

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
